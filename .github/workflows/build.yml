name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods
        pod repo update
        pod install

    - name: Build Application
      run: |
        xcodebuild build \
          -workspace SysDVRClient.xcworkspace \
          -scheme SysDVRClient \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          2>&1 | tee build.log

    - name: Check Build Output
      if: always()
      run: |
        if [ -f build.log ]; then
          tail -100 build.log
        fi
        find ./DerivedData -name "*.app" -type d

    - name: Create IPA
      run: |
        APP_PATH=$(find ./DerivedData -name "SysDVRClient.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: App not found!"
          exit 1
        fi
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        cd Payload && zip -r ../SysDVRClient.ipa . && cd ..
        ls -lh SysDVRClient.ipa

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: SysDVRClient-iOS
        path: SysDVRClient.ipa
        retention-days: 30
