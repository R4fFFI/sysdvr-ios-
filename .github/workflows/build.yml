name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods
        pod install

    - name: Build Application
      run: |
        xcodebuild build \
          -workspace SysDVRClient.xcworkspace \
          -scheme SysDVRClient \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          2>&1 | tee build.log

    - name: Show Build Log (Last 100 lines)
      if: always()
      run: tail -100 build.log

    - name: Find Built App
      run: |
        echo "=== Searching for SysDVRClient.app ==="
        find ./DerivedData -name "SysDVRClient.app" -type d
        ls -lh ./DerivedData/Build/Products/Release-iphoneos/ 2>/dev/null || echo "Products dir not found"

    - name: Create IPA
      run: |
        mkdir -p Payload
        APP_PATH=$(find ./DerivedData -name "SysDVRClient.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: SysDVRClient.app not found!"
          exit 1
        fi
        
        echo "Copying app from: $APP_PATH"
        cp -r "$APP_PATH" Payload/
        cd Payload && zip -r ../SysDVRClient.ipa . && cd ..
        echo "IPA created:"
        ls -lh SysDVRClient.ipa

    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: SysDVRClient-iOS
        path: SysDVRClient.ipa
