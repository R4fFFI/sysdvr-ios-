name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Create Shared Scheme
      run: |
        mkdir -p SysDVRClient.xcodeproj/xcshareddata/xcschemes
        cat > SysDVRClient.xcodeproj/xcshareddata/xcschemes/SysDVRClient.xcscheme << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <Scheme
           LastUpgradeVersion = "1540"
           version = "1.3">
           <BuildAction
              parallelizeBuildables = "YES"
              buildImplicitDependencies = "YES">
              <BuildActionEntries>
                 <BuildActionEntry
                    buildForTesting = "YES"
                    buildForRunning = "YES"
                    buildForProfiling = "YES"
                    buildForArchiving = "YES"
                    buildForAnalyzing = "YES">
                    <BuildableReference
                       BuildableIdentifier = "primary"
                       BlueprintIdentifier = "SysDVRClient"
                       BuildableName = "SysDVRClient.app"
                       BlueprintName = "SysDVRClient"
                       ReferencedContainer = "container:SysDVRClient.xcodeproj">
                    </BuildableReference>
                 </BuildActionEntry>
              </BuildActionEntries>
           </BuildAction>
           <LaunchAction
              buildConfiguration = "Release"
              executionConfiguration = "Release"
              launchStyle = "0"
              useCustomWorkingDirectory = "NO"
              ignoresPersistentStateOnLaunch = "NO"
              debugDocumentVersioning = "YES"
              debugServiceExtension = "internal"
              allowLocationSimulation = "YES">
              <BuildableProductRunnable
                 runnableDebuggingMode = "0">
                 <BuildableReference
                    BuildableIdentifier = "primary"
                    BlueprintIdentifier = "SysDVRClient"
                    BuildableName = "SysDVRClient.app"
                    BlueprintName = "SysDVRClient"
                    ReferencedContainer = "container:SysDVRClient.xcodeproj">
                 </BuildableReference>
              </BuildableProductRunnable>
           </LaunchAction>
           <ArchiveAction
              buildConfiguration = "Release"
              revealArchiveInOrganizer = "YES">
              <BuildableReference
                 BuildableIdentifier = "primary"
                 BlueprintIdentifier = "SysDVRClient"
                 BuildableName = "SysDVRClient.app"
                 BlueprintName = "SysDVRClient"
                 ReferencedContainer = "container:SysDVRClient.xcodeproj">
              </BuildableReference>
           </ArchiveAction>
        </Scheme>
        EOF

    - name: Install CocoaPods Dependencies
      run: |
        sudo gem install cocoapods
        pod install

    - name: List Available Schemes
      run: xcodebuild -workspace SysDVRClient.xcworkspace -list

    - name: Resolve Package Dependencies
      run: xcodebuild -resolvePackageDependencies -workspace SysDVRClient.xcworkspace -scheme SysDVRClient

    - name: Build App
      run: |
        xcodebuild build \
          -workspace SysDVRClient.xcworkspace \
          -scheme SysDVRClient \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          2>&1 | tee build.log

    - name: Show Build Log
      if: always()
      run: tail -150 build.log

    - name: Find Built App
      run: |
        echo "=== Searching for SysDVRClient.app ==="
        find . -name "SysDVRClient.app" -type d
        echo ""
        echo "=== Build Contents ==="
        ls -la ~/Library/Developer/Xcode/DerivedData/ 2>/dev/null | head -20 || echo "DerivedData not accessible"

    - name: Package into IPA
      run: |
        mkdir -p Payload
        APP_PATH=$(find . -name "SysDVRClient.app" -type d | head -n 1)
        echo "Found app at: $APP_PATH"
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: SysDVRClient.app not found!"
          exit 1
        fi
        
        cp -r "$APP_PATH" Payload/
        cd Payload && zip -r ../SysDVRClient.ipa . && cd ..
        ls -lh SysDVRClient.ipa

    - name: Upload IPA Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: SysDVRClient-iOS
        path: SysDVRClient.ipa
