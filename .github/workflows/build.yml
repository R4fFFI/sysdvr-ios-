name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Install CocoaPods Dependencies
      run: |
        gem install cocoapods
        pod install

    - name: Build App
      run: |
        xcodebuild -workspace SysDVRClient.xcworkspace \
                   -scheme SysDVRClient \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath build \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   clean build

    - name: Locate App
      run: find build -name "SysDVRClient.app" -type d

    - name: Package into IPA
      run: |
        APP_PATH=$(find build -name "SysDVRClient.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: SysDVRClient.app not found"
          exit 1
        fi
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r SysDVRClient.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SysDVRClient-iOS
        path: SysDVRClient.ipa
